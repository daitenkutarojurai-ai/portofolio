<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#131625"/>
  <g shape-rendering="crispEdges">
    <!-- Sonic ring remix, 40px per pixel, 10×10 grid → 400×400 -->
    <g fill="#00e5ff">
      <rect x="520" y="80"  width="160" height="40"/>
      <rect x="440" y="120" width="320" height="40"/>
      <rect x="400" y="160" width="80"  height="120"/>
      <rect x="720" y="160" width="80"  height="120"/>
    </g>
    <g fill="#ff2e88">
      <rect x="400" y="280" width="80"  height="120"/>
      <rect x="720" y="280" width="80"  height="120"/>
      <rect x="440" y="400" width="320" height="40"/>
      <rect x="520" y="440" width="160" height="40"/>
    </g>
  </g>
  <text x="600" y="530" text-anchor="middle" fill="#f5f5f0"
        font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="6">THOMAS FENDRICH</text>
  <text x="600" y="575" text-anchor="middle" fill="#00e5ff"
        font-family="'JetBrains Mono', monospace" font-size="20" letter-spacing="8">MAKER · HARDWARE · 3D · GAMES</text>
</svg>
