<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#131625"/>
  <g shape-rendering="crispEdges">
    <!-- 8-bit heart, 50px per pixel, 8×7 grid → 400×350, x=400 y=70 -->
    <g fill="#ff2e88">
      <rect x="450" y="70"  width="100" height="50"/>
      <rect x="650" y="70"  width="100" height="50"/>
      <rect x="400" y="120" width="400" height="150"/>
      <rect x="450" y="270" width="300" height="50"/>
      <rect x="500" y="320" width="200" height="50"/>
      <rect x="550" y="370" width="100" height="50"/>
    </g>
    <!-- cyan sprite shine -->
    <rect x="450" y="120" width="100" height="100" fill="#00e5ff"/>
  </g>
  <text x="600" y="500" text-anchor="middle" fill="#f5f5f0"
        font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="6">THOMAS FENDRICH</text>
  <text x="600" y="545" text-anchor="middle" fill="#00e5ff"
        font-family="'JetBrains Mono', monospace" font-size="20" letter-spacing="8">MAKER · HARDWARE · 3D · GAMES</text>
</svg>
