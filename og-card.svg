<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#131625"/>
  <g shape-rendering="crispEdges">
    <!-- Cart scaled 40px / pixel, 12×10 grid → 480×400, centered-up -->
    <rect x="520" y="80"  width="160" height="80"  fill="#00e5ff"/>
    <rect x="360" y="160" width="480" height="320" fill="#00e5ff"/>
    <rect x="400" y="240" width="400" height="160" fill="#ff2e88"/>
  </g>
  <text x="600" y="545" text-anchor="middle" fill="#f5f5f0"
        font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="6">THOMAS FENDRICH</text>
  <text x="600" y="585" text-anchor="middle" fill="#00e5ff"
        font-family="'JetBrains Mono', monospace" font-size="20" letter-spacing="8">MAKER · HARDWARE · 3D · GAMES</text>
</svg>
