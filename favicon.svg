<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- indigo rounded tile, matches body bg (#131625) -->
  <rect width="32" height="32" rx="5" fill="#131625"/>
  <!-- 8-bit heart sprite, 8×7 grid scaled 3×, centered at x=4 y=5 -->
  <g fill="#ff2e88">
    <rect x="7"  y="5"  width="6"  height="3"/>
    <rect x="19" y="5"  width="6"  height="3"/>
    <rect x="4"  y="8"  width="24" height="9"/>
    <rect x="7"  y="17" width="18" height="3"/>
    <rect x="10" y="20" width="12" height="3"/>
    <rect x="13" y="23" width="6"  height="3"/>
  </g>
  <!-- cyan sprite shine on upper-left lobe -->
  <rect x="7" y="8" width="6" height="6" fill="#00e5ff"/>
</svg>
