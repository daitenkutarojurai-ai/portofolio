    <rect x="2"  y="11" width="2"  height="6"/>
    <rect x="28" y="11" width="2"  height="6"/>
    <rect x="2"  y="17" width="28" height="2"/>
    <rect x="2"  y="19" width="4"  height="4"/>
    <rect x="10" y="19" width="4"  height="4"/>
    <rect x="18" y="19" width="4"  height="4"/>
    <rect x="26" y="19" width="4"  height="4"/>
    <rect x="2"  y="23" width="28" height="2"/>
    <rect x="4"  y="25" width="24" height="2"/>
