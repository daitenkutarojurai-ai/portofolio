<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- indigo rounded tile, matches body bg (#131625) -->
  <rect width="32" height="32" rx="5" fill="#131625"/>
  <!-- Mega Drive cart, 12×10 pixel grid scaled 2×, centered -->
  <!-- top connector tab -->
  <rect x="12" y="6" width="8" height="4" fill="#00e5ff"/>
  <!-- cart body -->
  <rect x="4" y="10" width="24" height="16" fill="#00e5ff"/>
  <!-- magenta label sticker -->
  <rect x="6" y="14" width="20" height="8" fill="#ff2e88"/>
</svg>
