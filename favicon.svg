<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- indigo rounded tile, matches body bg (#131625) -->
  <rect width="32" height="32" rx="5" fill="#131625"/>
  <!-- Sonic ring remix, 10×10 grid × 3, centered with 1px tile padding -->
  <g fill="#00e5ff">
    <rect x="10" y="1"  width="12" height="3"/>
    <rect x="4"  y="4"  width="24" height="3"/>
    <rect x="1"  y="7"  width="6"  height="9"/>
    <rect x="25" y="7"  width="6"  height="9"/>
  </g>
  <g fill="#ff2e88">
    <rect x="1"  y="16" width="6"  height="9"/>
    <rect x="25" y="16" width="6"  height="9"/>
    <rect x="4"  y="25" width="24" height="3"/>
    <rect x="10" y="28" width="12" height="3"/>
  </g>
</svg>
