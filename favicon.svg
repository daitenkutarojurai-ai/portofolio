<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- indigo rounded tile -->
  <rect width="100" height="100" rx="16" fill="#131625"/>
  <!-- outer hexagon, cyan stroke -->
  <polygon points="50,8 84,28 84,72 50,92 16,72 16,28"
    fill="#ff2e88" fill-opacity="0.12"
    stroke="#00e5ff" stroke-width="7" stroke-linejoin="round"/>
  <!-- inner hexagon, magenta stroke -->
  <polygon points="50,28 68,38 68,62 50,72 32,62 32,38"
    fill="none" stroke="#ff2e88" stroke-width="4" stroke-linejoin="round"/>
</svg>
