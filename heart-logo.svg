<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 7" shape-rendering="crispEdges">
  <!-- 8-bit sprite heart, 8×7 pixel grid, site palette -->
  <g fill="#ff2e88">
    <rect x="1" y="0" width="2" height="1"/>
    <rect x="5" y="0" width="2" height="1"/>
    <rect x="0" y="1" width="8" height="3"/>
    <rect x="1" y="4" width="6" height="1"/>
    <rect x="2" y="5" width="4" height="1"/>
    <rect x="3" y="6" width="2" height="1"/>
  </g>
  <!-- cyan sprite shine on upper-left lobe -->
  <rect x="1" y="1" width="2" height="2" fill="#00e5ff"/>
</svg>
