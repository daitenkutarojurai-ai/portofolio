<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" shape-rendering="crispEdges">
  <!-- Sonic-ring remix, 10×10 pixel grid, horizontal palette split -->
  <g fill="#00e5ff">
    <rect x="3" y="0" width="4" height="1"/>
    <rect x="1" y="1" width="8" height="1"/>
    <rect x="0" y="2" width="2" height="3"/>
    <rect x="8" y="2" width="2" height="3"/>
  </g>
  <g fill="#ff2e88">
    <rect x="0" y="5" width="2" height="3"/>
    <rect x="8" y="5" width="2" height="3"/>
    <rect x="1" y="8" width="8" height="1"/>
    <rect x="3" y="9" width="4" height="1"/>
  </g>
</svg>
